# ============================================================
# ETS MARL — Configuration v4.2
# P1-P4 roadmap applied; agent cycling + opponent modeling added
# ============================================================

simulation:
  n_years: 12         # solar (2yr) and onshore (5yr) payoffs fit within episode
  n_episodes: 10000
  seeds: [42, 123, 456]

# ----------------------------------------------------------
# Technology parameters (5 technologies)
# Sources: IRENA 2024, IPCC AR5, IEA WEO 2024
# ----------------------------------------------------------
technologies:
  names: ["coal", "gas", "onshore_wind", "offshore_wind", "solar"]
  emission_factors: [0.820, 0.490, 0.011, 0.012, 0.048]  # tCO2/MWh
  capex: [3000, 1150, 1350, 3250, 750]                   # EUR/kW (IRENA 2024)
  capacity_factors: [0.65, 0.60, 0.35, 0.47, 0.17]
  deploy_delays: [0, 0, 5, 8, 2]                          # years; coal/gas legacy-only
  operational_costs: [72.0, 55.0, 17.0, 47.0, 10.0]      # EUR/MWh fuel+O&M
  decommission_costs: [200, 100, 0, 0, 0]                 # EUR/kW
  is_green: [false, false, true, true, true]
  is_buildable: [false, false, true, true, true]

# ----------------------------------------------------------
# ETS parameters
# ----------------------------------------------------------
ets:
  cap_year_0: 9.10
  lrf_phase1: 0.043
  lrf_phase2: 0.044
  lrf_phase_switch: 4

  msr:
    enabled: true
    tnac_upper: 3.64
    tnac_lower: 1.37
    withhold_rate: 0.24
    release_amount: 0.08

  banking: true
  reserve_price: 40.0   # realistic floor; prevents zero-price collapse

# ----------------------------------------------------------
# Companies (4 agents)
# ----------------------------------------------------------
companies:
  n_agents: 4
  output_twh: 10.0
  initial_mix:
    - [0.40, 0.40, 0.10, 0.05, 0.05]   # A1: coal-heavy (20% green)
    - [0.15, 0.45, 0.20, 0.10, 0.10]   # A2: gas-dominant (40% green)
    - [0.05, 0.25, 0.35, 0.20, 0.15]   # A3: mixed transitioner (70% green)
    - [0.00, 0.10, 0.30, 0.35, 0.25]   # A4: near-green leader (90% green)
  reward_weights:
    - [0.90, 0.10]   # A1: cost-minimizing
    - [0.75, 0.25]   # A2: moderate cost
    - [0.50, 0.50]   # A3: balanced
    - [0.25, 0.75]   # A4: green-focused

investment:
  max_invest_frac: 0.05
  convexity_alpha: 0.10

risk:
  p_fail_min: 0.08
  p_fail_max: 0.65
  p_fail_alpha: 0.7
  experience_discount: 0.10
  experience_threshold: 2

auction:
  price_max: 200.0
  price_min: 20.0
  quantity_max: 5.0
  # NOTE: bid_penalty_alpha removed — the bid cost penalty created unrealistic
  # incentives that distorted equilibrium bidding. Price discovery is now handled
  # by reserve_price and MA3 observation signal alone.

trading:
  enabled: true
  transaction_cost: 0.5
  spread_tolerance: 0.07      # P8: ±7% of clearing_price — allows trades within this spread
  banking_holding_cost: 0.01  # P8: €/t/year cost on excess banked allowances
  excess_bank_ratio: 1.5      # P8: bank above this × annual_need incurs holding cost

budget:
  annual_budgets: [640.0, 426.0, 223.0, 79.0]
  overspend_penalty_coef: 2.0

penalty:
  rate: 100.0
  non_compliance_multiplier: 3.0

price:
  initial_expected: 80.0
  price_floor: 50.0
  ar1_persistence: 0.85
  volatility_std: 0.15

# ----------------------------------------------------------
# Reward shaping (P3 + P4)
# ----------------------------------------------------------
reward:
  # P3: Per-agent running reward normalisation (EMA alpha=0.01)
  normalizer_alpha: 0.01
  clip_min: -10.0
  clip_max: 5.0    # relaxed from 2.0 — allow good trading years to stand out
  # P3: Green penalty floor = initial fossil fractions [A1..A4]
  green_floor_fossil: [0.80, 0.60, 0.30, 0.10]
  # P4: Shaping
  shaping_beta: 10.0
  shaping_gamma: 1.0
  shaping_lockin_penalty: 2.0
  shaping_decay_episode: 3000
  shaping_lockin_start_episode: 200

# ----------------------------------------------------------
# Opponent modeling (Option C)
# Each agent's Phase-1 obs is augmented with last-episode
# (bid/200, green_frac) pairs for every other agent.
# For 4 agents: +6 dimensions → obs_dim_phase1 = 24, phase2 = 27.
# ----------------------------------------------------------
opponent_modeling:
  enabled: true

# ----------------------------------------------------------
# Agent cycling (Option A)
# Only one agent updates its weights per episode, cycling round-robin.
# Non-active agents still collect experience.
#   soft: false  → hard freeze (buffer discarded for non-active)
#   soft: true   → non-active update with soft_lr_scale × base_lr
# ----------------------------------------------------------
agent_cycling:
  enabled: true
  soft: false
  soft_lr_scale: 0.1

# --- PPO ---
ppo:
  hidden_size: 128
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.97        # P2: extended credit assignment
  clip_eps: 0.2
  # P2: Entropy decay — condition-based (replaces episode counter trigger):
  # decay begins only after (1) price_std<40 over last 100 eps AND
  # (2) no agent green fraction decreased in last 50 consecutive episodes.
  entropy_coef: 0.05
  entropy_coef_final: 0.005
  entropy_decay_window: 2000  # episodes of decay after condition is met
  value_coef: 0.5
  max_grad_norm: 0.5
  n_epochs: 4
  mini_batch_size: 64
  normalize_advantages: true
  log_std_min: -2.0
  log_std_max: 1.0

# ----------------------------------------------------------
# P5: Demand & Emission Uncertainty
# ----------------------------------------------------------
uncertainty:
  enabled: true
  sigma_demand: 0.07        # annual emission shock std (~7% variation, EU power sector data)
  corr_rho: 0.40            # cross-agent correlation (0=independent, 1=fully correlated)

# ----------------------------------------------------------
# P6: Construction Delay Jitter & Capacity Uncertainty
# ----------------------------------------------------------
construction_jitter:
  enabled: true
  # Poisson means for each tech [coal, gas, onshore_wind, offshore_wind, solar]
  # Replaces fixed deploy_delays; col/gas kept for completeness (not buildable)
  poisson_lambdas: [1.0, 1.0, 2.0, 3.0, 1.5]
  p_cancel: 0.03            # annual cancellation probability per queued project
  recovery_rate: 0.40       # fraction of already-spent capex recovered on cancellation
  # CF noise std per tech (0 for dispatchable): [coal, gas, onshore, offshore, solar]
  cf_sigma: [0.0, 0.0, 0.08, 0.08, 0.05]

# ----------------------------------------------------------
# P7: Warm-Start Pipeline
# ----------------------------------------------------------
warm_start:
  enabled: true
  # Seed price history with this many synthetic prices before RL episode starts
  n_burnin_prices: 2
  # Seed initial bank as a uniform random multiple of annual_need
  bank_seed_min: 0.5
  bank_seed_max: 2.0
  # Mean number of in-flight projects per green tech at reset (Poisson)
  queue_mu_onshore: 1.5
  queue_mu_offshore: 0.5
  queue_mu_solar: 2.0

# ----------------------------------------------------------
# P8: Secondary Market Depth
# ----------------------------------------------------------
# (updates to existing 'trading' section below)

logging:
  log_interval: 10
  save_interval: 500
  results_dir: "results/"
